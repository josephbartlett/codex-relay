id: CFO-0045
title: Slack control-plane live validation
status: done
owner: lead
role: verifier
priority: p1
objective: Validate Slack as the primary Codex Relay control plane for read-only questions, plan/approve execution, follow-up continuity, local handoff, status, audit, cleanup, and PR-oriented lifecycle behavior without recording local identities, Slack IDs, tokens, or private channel details.
paths:
  - apps/orchestrator/src/slackNotifications.ts
  - apps/slack-gateway/src/blocks/taskCards.ts
  - apps/slack-gateway/src/listeners/actions.ts
  - docs/MAINTENANCE_AUDIT.md
  - docs/TASKS.md
  - docs/work-packets/0045-slack-control-plane-live-validation.yaml
  - scripts/slack-smoke.mjs
  - tests/email-notifications.test.ts
  - tests/slack-notifications.test.ts
concerns:
  - concern:slack-live-validation
  - concern:mobile-codex-cli-workflow
dependencies:
  - CFO-0043
  - CFO-0044
non_goals:
  - Do not edit `.env`.
  - Do not print, track, or commit Slack tokens, user IDs, channel IDs, team IDs, message timestamps, private channel names, local paths, or live task contents.
  - Do not push, tag, publish, or create a release.
  - Do not weaken authorization, worktree isolation, direct-workspace gates, or approval requirements.
  - Do not weaken or bypass email-originated write approval deferral.
acceptance:
  - Static and unit coverage for Slack mention, action, shortcut, command, notification, and local handoff paths is reviewed and rerun.
  - Slack gateway and runner startup posture is validated from WSL without leaking secrets.
  - Real Slack live smoke capability is tested when a dedicated local smoke identity and private test channel are configured.
  - Any untestable live surface is recorded with the exact missing local prerequisite and a safe next test.
  - "The validation matrix focuses on Codex CLI on the go: ask, continue, plan, approve, summarize, PR handoff, status/audit visibility, and local-session continuation."
verification:
  required:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - npm run validate:live-config
  completed:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - npm run validate:live-config (protected env failed closed as expected)
    - npm run smoke:slack (blocked on missing local smoke env)
    - redacted Slack Web API auth checks
    - temporary strict-mode Slack gateway startup check
    - temporary local runner daemon startup check
    - manual Slack ask live smoke
    - manual Slack threaded ask follow-up live smoke
    - manual Slack plan/approve/worktree execution live smoke
  evidence:
    - "`npm run check` passed with 129 tests, setup validation, work-packet validation, release readiness, npm audit, and secret scan."
    - "Focused Slack/control-plane regression suite passed with 45 tests covering authorization, mention intent, ask mode, direct workspace gating, approval ownership, PR lifecycle actions, notification publishing, local handoff continuation, and live-config validation."
    - "Slack bot Web API authentication passed without printing token, team, user, bot, or URL values."
    - "Slack Socket Mode app token accepted a redacted `apps.connections.open` check without printing the returned WebSocket URL."
    - "Slack gateway started under temporary strict deny-all policy with configured Slack app credentials and a temporary ignored state path; no Slack user/channel/repo allowlists were printed or tracked."
    - "Local runner daemon started against the same temporary ignored state path."
    - "Protected local `.env` strict validation failed closed because local Slack user/channel allowlists, repo-specific Slack policy, and the repo binding are not configured in this environment."
    - "`npm run smoke:slack` now loads `.env`, but live posting is blocked until `SLACK_SMOKE_TOKEN`, `SLACK_SMOKE_CHANNEL_ID`, and `SLACK_SMOKE_BOT_USER_ID` are configured locally."
    - "A temporary non-secret env fixture passed strict live-config validation with fake Slack IDs and a generic local repo path."
    - "Manual Slack ask against the disposable repo returned the package name from `package.json`."
    - "Manual Slack threaded ask reused the existing Slack session and returned the root files from the disposable repo."
    - "Manual Slack plan/approve smoke created an isolated worktree, created the requested smoke markdown file, kept the source repo clean, and recorded plan, approval, and execution audit events."
    - "Live plan text exposed a runner-authored local markdown path and the kickoff details action failed to resolve the session from one Slack action payload shape; both findings are being fixed before release."
    - "After patching, a fresh Slack plan/approve/worktree smoke completed through a single gateway/runner pair with no local paths in Slack thread history."
    - "After patching, Slack diff summary opened successfully and displayed only repo id, branch, status, changed file, diff stat, and name-status details for the disposable worktree."
handoff:
  expected:
    - Report what Slack surfaces were verified, what is blocked by missing local smoke configuration, what remains human/manual, and whether code changes are required.
  completed:
    - Slack token and Socket Mode connectivity are valid from WSL.
    - Static and automated Slack coverage is passing.
    - Slack smoke helper now matches the runbook by loading local `.env` values.
    - Real Slack event-originated ask, threaded ask, and plan/approval/worktree execution smokes ran manually through the configured workspace.
    - Patched Slack plan/approval/worktree execution and diff summary modal behavior were validated manually after duplicate gateway processes were removed.
  next:
    - Configure a dedicated local Slack smoke identity token, private test channel ID, and Codex Relay bot user ID in local `.env` if automated Slack smoke posting is still desired.
    - Re-run local handoff, slash command, App Home, cleanup, and PR lifecycle smokes against a disposable repo when those surfaces are in scope.
risks:
  - A bot-originated Slack message may not produce a real `app_mention` event; live smoke needs a non-Relay Slack identity.
  - Strict Slack policy may fail closed until local allowlists include the dedicated test identity and private test channel.
  - Full write-mode and PR lifecycle smokes can mutate disposable repos or GitHub PR state and must stay clearly scoped.
maintenance_audit:
  assigned_at: "2026-04-17"
  completed_at: "2026-04-17"
  reviewed_by: "lead"
  checks:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - npm run validate:live-config
  artifact: "local Slack live-validation hardening checkpoint; commit 1160007"
  notes:
    - Opened after email live validation advanced further than Slack live validation and the product direction was clarified as Codex CLI on the go.
    - Manual live smoke advanced ask, threaded ask, and plan/approval/worktree execution. Validation found local-path leakage in runner-authored Slack plan text and a details-action session lookup gap; both are now tracked in this packet.
    - Patched live smoke confirmed local-path redaction and diff summary modal behavior after duplicate stale gateway processes were removed.
    - Closed as accepted release evidence for the v0.2.0 Slack control-plane scope.
