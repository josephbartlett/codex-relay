id: CFO-0045
title: Slack control-plane live validation
status: blocked
owner: lead
role: verifier
priority: p1
objective: Validate Slack as the primary Codex Relay control plane for read-only questions, plan/approve execution, follow-up continuity, local handoff, status, audit, cleanup, and PR-oriented lifecycle behavior without recording local identities, Slack IDs, tokens, or private channel details.
paths:
  - docs/MAINTENANCE_AUDIT.md
  - docs/TASKS.md
  - docs/work-packets/0045-slack-control-plane-live-validation.yaml
  - scripts/slack-smoke.mjs
concerns:
  - concern:slack-live-validation
  - concern:mobile-codex-cli-workflow
dependencies:
  - CFO-0043
  - CFO-0044
non_goals:
  - Do not edit `.env`.
  - Do not print, track, or commit Slack tokens, user IDs, channel IDs, team IDs, message timestamps, private channel names, local paths, or live task contents.
  - Do not push, tag, publish, or create a release.
  - Do not weaken authorization, worktree isolation, direct-workspace gates, or approval requirements.
  - Do not close email live-validation packet `CFO-0042`.
acceptance:
  - Static and unit coverage for Slack mention, action, shortcut, command, notification, and local handoff paths is reviewed and rerun.
  - Slack gateway and runner startup posture is validated from WSL without leaking secrets.
  - Real Slack live smoke capability is tested when a dedicated local smoke identity and private test channel are configured.
  - Any untestable live surface is recorded with the exact missing local prerequisite and a safe next test.
  - "The validation matrix focuses on Codex CLI on the go: ask, continue, plan, approve, summarize, PR handoff, status/audit visibility, and local-session continuation."
verification:
  required:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - npm run validate:live-config
  completed:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - npm run validate:live-config (protected env failed closed as expected)
    - npm run smoke:slack (blocked on missing local smoke env)
    - redacted Slack Web API auth checks
    - temporary strict-mode Slack gateway startup check
    - temporary local runner daemon startup check
  evidence:
    - "`npm run check` passed with 127 tests, setup validation, work-packet validation, release readiness, npm audit, and secret scan."
    - "Focused Slack/control-plane regression suite passed with 45 tests covering authorization, mention intent, ask mode, direct workspace gating, approval ownership, PR lifecycle actions, notification publishing, local handoff continuation, and live-config validation."
    - "Slack bot Web API authentication passed without printing token, team, user, bot, or URL values."
    - "Slack Socket Mode app token accepted a redacted `apps.connections.open` check without printing the returned WebSocket URL."
    - "Slack gateway started under temporary strict deny-all policy with the real app credentials and a temporary ignored state path; no real Slack user/channel/repo allowlists were printed or tracked."
    - "Local runner daemon started against the same temporary ignored state path."
    - "Actual protected `.env` strict validation failed closed because local Slack user/channel allowlists, repo-specific Slack policy, and the WSL repo binding are not configured in this environment."
    - "`npm run smoke:slack` now loads `.env`, but live posting is blocked until `SLACK_SMOKE_TOKEN`, `SLACK_SMOKE_CHANNEL_ID`, and `SLACK_SMOKE_BOT_USER_ID` are configured locally."
    - "A temporary non-secret env fixture passed strict live-config validation with fake Slack IDs and the WSL repo path."
handoff:
  expected:
    - Report what Slack surfaces were verified, what is blocked by missing local smoke configuration, what remains human/manual, and whether code changes are required.
  completed:
    - Slack token and Socket Mode connectivity are valid from WSL.
    - Static and automated Slack coverage is passing.
    - Slack smoke helper now matches the runbook by loading local `.env` values.
    - Real Slack event-originated smoke is not yet possible from this session because the dedicated local smoke identity/channel variables are absent and strict `.env` policy is not configured for WSL.
  next:
    - Configure a dedicated local Slack smoke identity token, private test channel ID, and Codex Relay bot user ID in local `.env`.
    - Configure strict local Slack user/channel/repo allowlists and a real WSL repo binding in local `.env`.
    - Re-run read-only ask, follow-up ask, plan creation, approval execution, diff summary, local handoff, slash command, App Home, cleanup, and PR lifecycle smokes against a disposable repo.
risks:
  - A bot-originated Slack message may not produce a real `app_mention` event; live smoke needs a non-Relay Slack identity.
  - Strict Slack policy may fail closed until local allowlists include the dedicated test identity and private test channel.
  - Full write-mode and PR lifecycle smokes can mutate disposable repos or GitHub PR state and must stay clearly scoped.
maintenance_audit:
  assigned_at: "2026-04-17"
  artifact: "Slack validation packet opened for local verification"
  notes:
    - Opened after email live validation advanced further than Slack live validation and the product direction was clarified as Codex CLI on the go.
    - Blocked only on local live-smoke prerequisites; automated Slack/control-plane coverage and Slack credential connectivity passed.
