id: CFO-0029
title: Public artifact hygiene audit
status: done
owner: lead
role: release
priority: p0
objective: Remove local, personal, private-context, and informal internal artifacts from tracked public-facing repository content before public release.
paths:
  - AGENTS.md
  - CHANGELOG.md
  - docs/AGENT_ORCHESTRATION.md
  - docs/DECISIONS.md
  - docs/MAINTENANCE_AUDIT.md
