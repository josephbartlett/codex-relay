acceptance:
  - Pattern spec defines Custody-First Orchestration, invariants, roles, state machine, examples, and anti-patterns.
  - Case study explains how Codex Relay uses the pattern to build itself.
  - Work packets are machine-readable YAML and represent current and upcoming release work.
  - Work packet checker detects active ownership conflicts and missing verification/audit evidence.
  - Maintenance audit records packet assignment, completion, review, checks, and commits.
  - Role-specific packet templates exist for implementation, exploration, security review, verification, and release work.
  - Pattern extraction is explicitly deferred until the repo has validated the system.
