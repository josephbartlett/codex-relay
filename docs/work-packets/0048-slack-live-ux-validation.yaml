id: CFO-0048
title: Slack live UX validation
status: active
owner: lead
role: verifier
priority: p1
objective: Live-validate slash command, App Home/status, and PR lifecycle behavior after the Slack UX hardening checkpoint without recording private Slack, repo, token, or local machine details.
paths:
  - apps/slack-gateway/src/blocks/taskCards.ts
  - apps/slack-gateway/src/listeners/actions.ts
  - tests/slack-notifications.test.ts
  - docs/TASKS.md
  - docs/MAINTENANCE_AUDIT.md
  - docs/RELEASE_READINESS.md
  - docs/work-packets/0048-slack-live-ux-validation.yaml
concerns:
  - concern:slack-live-validation
  - concern:slash-command-smoke
  - concern:app-home-smoke
  - concern:pr-lifecycle-smoke
dependencies:
  - CFO-0047
non_goals:
  - Do not edit `.env`.
  - Do not print, track, or commit Slack tokens, Slack IDs, channel names, private repo paths, local usernames, or live task text beyond generic descriptions.
  - Do not make product code changes unless the live smoke exposes a concrete bug.
  - Do not push, tag, publish, or create a release.
  - Do not use a non-disposable repository for write or PR lifecycle validation.
acceptance:
  - Slash command smoke is completed through the live Slack app or the exact blocker is recorded.
  - App Home/status surface smoke is completed through the live Slack app or the exact blocker is recorded.
  - PR lifecycle smoke is completed against a disposable repository or the exact blocker is recorded.
  - One-shot Slack action buttons found during live smoke are removed or refreshed after successful action acceptance.
  - Any Slack UX issue found during live smoke is triaged before packet closure.
  - Public notes remain redacted and contain no private Slack IDs, tokens, local paths, or private task content.
verification:
  required:
    - npm run check:work-packets
    - npm run typecheck
    - npm run build
    - npm test
    - npm run check
    - git diff --check
    - targeted public-risk string scan
  completed: []
  evidence:
    - "Live `/codex status` returned a normal no-tasks status response after restarting the gateway with the intended local-dev override."
    - "Live `/codex new` created a `repo:default` planning session against the disposable repo."
    - "App Home rendered recent session and audit state for the live session."
    - "App Home approval accepted the execution request and the implementation completed in the isolated worktree."
    - "The disposable source repo remained clean after approval-gated execution."
    - "Live smoke found that App Home approval buttons remain visually actionable after click; code now refreshes approval source surfaces after acceptance."
    - "Focused Slack regression tests passed after the one-shot action refresh fix."
    - "A patched gateway/runner pair was started for retest, but no second deterministic changed-file task reached the gateway before services were stopped."
handoff:
  expected:
    - Report live surfaces tested, redacted outcomes, bugs found or not found, and any remaining local-only prerequisites.
  completed: []
  next:
    - Re-run the deterministic changed-file Slack task on the patched gateway.
    - Confirm App Home approval disappears or refreshes after click.
    - Complete Create PR, PR status, and Ready for review live smoke against the disposable repo.
risks:
  - Live Slack smoke depends on workspace app configuration and may require maintainer-side clicks.
  - PR lifecycle smoke mutates disposable branch and PR state; keep it scoped to a disposable repository.
  - Captured evidence must be summarized without exposing private Slack workspace details or local machine details.
maintenance_audit:
  assigned_at: "2026-04-17"
  artifact: "Slack live UX validation packet opened"
  notes:
    - Opened after CFO-0047 added deterministic coverage and the maintainer volunteered to assist with live Slack validation.
